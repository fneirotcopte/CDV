<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Empleado - Municipalidad</title>
  <link rel="stylesheet" href="./styles/registro-usuario.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>
  <div class="main-container">
    <div class="form-box">
      <img src="../img/logo-bromatologia4.png" alt="Logo Bromatología" class="logo">

      <div class="form-content">
        <h1 id="form-title">Registro de Empleado</h1>

        <form id="register-form" action="/api/auth/registrar" method="POST" aria-labelledby="form-title">
          <div class="form-section">
            <div class="section-header" onclick="toggleSection(this)" role="button" aria-expanded="true"
              aria-controls="datos-personales" tabindex="0">
              <span>Datos Personales</span>
              <span class="section-icon"><i class="fas fa-chevron-down"></i></span>
            </div>
            <div id="datos-personales" class="section-content active" role="region">
              <div class="compact-row">
                <div class="form-group">
                  <label for="nombre">Nombre</label>
                  <input type="text" id="nombre" name="nombre" required placeholder="Ej: Juan" aria-required="true">
                </div>
                <div class="form-group">
                  <label for="apellido">Apellido</label>
                  <input type="text" id="apellido" name="apellido" required placeholder="Ej: Pérez"
                    aria-required="true">
                </div>
              </div>

              <div class="form-group">
                <label for="dni">DNI</label>
                <input type="text" id="dni" name="dni" required placeholder="Ej: 12345678" aria-required="true"
                  pattern="[0-9]{7,8}">
              </div>

              <div class="form-group">
                <label for="domicilio">Domicilio</label>
                <input type="text" id="domicilio" name="domicilio" required placeholder="Ej: Calle 123"
                  aria-required="true">
              </div>

              <div class="form-group">
                <label for="telefono">Teléfono</label>
                <input type="tel" id="telefono" name="telefono" required placeholder="Ej: 3854123456"
                  aria-required="true" pattern="[0-9]{10}">
              </div>

              <div class="form-group">
                <label for="area">Área</label>
                <input type="text" id="area" name="area" required placeholder="Ej: Bromatología" aria-required="true">
              </div>
            </div>
          </div>

          <div class="form-section">
            <div class="section-header" onclick="toggleSection(this)" role="button" aria-expanded="false"
              aria-controls="credenciales" tabindex="0">
              <span>Credenciales de Acceso</span>
              <span class="section-icon"><i class="fas fa-chevron-down"></i></span>
            </div>
            <div id="credenciales" class="section-content" role="region">
              <div class="form-group">
                <label for="correo_electronico">Correo electrónico</label>
                <input type="email" id="correo_electronico" name="correo_electronico" required
                  placeholder="Ej: ejemplo@dominio.com" aria-required="true">
              </div>

              <div class="compact-row">
                <div class="form-group">
                  <label for="contraseña">Contraseña</label>
                  <input type="password" id="contraseña" name="contraseña" required placeholder="Mínimo 8 caracteres"
                    aria-required="true" minlength="8">
                  <div class="password-strength">
                    <span class="strength-bar"></span>
                    <span class="strength-bar"></span>
                    <span class="strength-bar"></span>
                    <span class="strength-text"></span>
                  </div>
                </div>
                <div class="form-group">
                  <label for="confirm-contraseña">Confirmar contraseña</label>
                  <input type="password" id="confirm-contraseña" name="confirm-contraseña" required
                    placeholder="Repita su contraseña" aria-required="true">
                  <span class="error-message"></span>
                </div>
              </div>

              <div class="form-group">
                <label for="rol">Rol</label>
                <select id="rol" name="rol" required aria-required="true">
                  <option value="">Seleccione un rol</option>
                  <option value="administrador">Administrador</option>
                  <option value="administrativo">Administrativo</option>
                  <option value="inspector">Inspector</option>
                </select>
              </div>
            </div>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn-submit">Registrarse</button>
          </div>
        </form>
      </div>
    </div>
  </div>

    <script src="./scripts/registro-usuario.js"></script>
</body>

</html>
