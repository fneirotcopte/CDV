<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso al Sistema - Bromatología</title>
  <link rel="stylesheet" href="./styles/login2.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
  <!-- Contenedor principal con imagen de fondo -->
  <div class="main-container">
    <!-- Recuadro con transparencia -->
    <div class="login-box">
      <!-- Logo fijo en la parte superior -->
      <img src="../img/logo-bromatologia4.png" alt="Logo Bromatología" class="logo">
      
      <!-- Formulario de login -->
      <div id="login-form" class="form-container">
        <h2>Ingresa tu usuario y contraseña</h2>
        <div class="input-group">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" placeholder="Ingresa tu correo electrónico">
        </div>
        <div class="input-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="Ingresa tu contraseña">
        </div>
        <button onclick="login()" class="login-btn">Iniciar sesión</button>
        <div class="form-footer">
          <div class="forgot-password">
            <a href="#" onclick="showRecoveryForm()">¿Has extraviado la contraseña?</a>
          </div>
          <div id="register-link" class="register-link" style="display: none;">
            ¿No tienes cuenta? <a href="#" onclick="showRegisterForm()">Regístrate aquí</a>
          </div>
        </div>
      </div>
      
      <!-- Formulario de recuperación (oculto inicialmente) -->
      <div id="recovery-form" class="form-container" style="display: none;">
        <h2>Recuperar contraseña</h2>
        <div class="input-group">
          <label for="recovery-email">Correo electrónico</label>
          <input type="email" id="recovery-email" placeholder="Ingresa tu correo registrado">
        </div>
        <button onclick="recoverPassword()" class="login-btn">Enviar recuperación</button>
        <button onclick="hideRecoveryForm()" class="cancel-btn">Cancelar</button>
      </div>

      <!-- Mensaje de carga -->
      <div id="loading-message" style="display: none; text-align: center; color: white; margin-top: 15px;">
        <i class="fas fa-spinner fa-spin"></i> Procesando...
      </div>

      <!-- Mensaje de error -->
      <div id="error-message" style="display: none; text-align: center; color: #ffcccc; margin-top: 15px;"></div>
    </div>
  </div>

  <script src="./scripts/login2.js"></script>
</body>
</html>
